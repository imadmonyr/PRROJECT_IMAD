{% extends 'base.html' %}
{% block title %}Modifier Agent - LuxeDrive{% endblock %}
{% block page_title %}Modifier Agent{% endblock %}

{% block content %}
<div class="header-actions" style="margin-bottom:1.5rem;">
    <a href="{{ url_for('agents') }}" class="btn" style="background:var(--sidebar-bg);border:1px solid var(--border-color);">
        <i class='bx bx-arrow-back'></i> Retour
    </a>
</div>
<div class="form-container" style="max-width:500px;">
    <h2 style="font-size:1.1rem;font-weight:600;margin-bottom:1.5rem;">Modifier : {{ agent.prenom }} {{ agent.nom }}</h2>
    <form method="POST" action="{{ url_for('agent_edit', id_agent=agent.id_agent) }}">
        <div class="form-group"><label>Nom</label><input type="text" name="nom" value="{{ agent.nom }}" required></div>
        <div class="form-group"><label>Prénom</label><input type="text" name="prenom" value="{{ agent.prenom }}" required></div>
        <div class="form-group"><label>Téléphone</label><input type="text" name="telephone" value="{{ agent.telephone }}"></div>
        <div class="form-group"><label>Email</label><input type="email" name="email" value="{{ agent.email }}"></div>
        <div class="form-group"><label>Taux de Commission (%)</label><input type="number" name="taux_commission" value="{{ agent.taux_commission }}" step="0.01" min="0" max="100" required></div>
        <div style="margin-top:1.5rem;text-align:right;">
            <button type="submit" class="btn"><i class='bx bx-save'></i> Enregistrer</button>
        </div>
    </form>
</div>
{% endblock %}
