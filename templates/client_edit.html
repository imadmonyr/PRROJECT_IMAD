{% extends 'base.html' %}
{% block content %}

<style>
  .edit-container {
    max-width: 680px;
    margin: 0 auto;
  }
  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    color: #555;
    font-size: 0.85rem;
    text-decoration: none;
    margin-bottom: 24px;
    transition: color 0.2s;
  }
  .back-link:hover { color: #fff; }

  .edit-card {
    background: #0f0f0f;
    border: 1px solid #1e1e1e;
    border-radius: 14px;
    overflow: hidden;
  }
  .edit-card-header {
    background: #990000;
    padding: 18px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .edit-card-header i { font-size: 1.4rem; color: #fff; }
  .edit-card-header h2 {
    font-size: 1.1rem;
    font-weight: 700;
    color: #fff;
    margin: 0;
  }
  .edit-card-header p {
    font-size: 0.8rem;
    color: rgba(255,255,255,0.6);
    margin: 2px 0 0;
  }

  .edit-card-body { padding: 28px 24px; }

  .section-label {
    font-size: 0.72rem;
    font-weight: 600;
    color: #555;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 14px;
    padding-bottom: 8px;
    border-bottom: 1px solid #1e1e1e;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .section-label i { color: #990000; font-size: 0.9rem; }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-bottom: 14px;
  }
  .form-row.full { grid-template-columns: 1fr; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group label {
    font-size: 0.8rem;
    color: #888;
    font-weight: 500;
  }
  .form-group input {
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 8px;
    color: #fff;
    font-size: 0.9rem;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .form-group input:focus {
    border-color: #990000;
    box-shadow: 0 0 0 3px rgba(153,0,0,0.1);
  }
  .form-group input::placeholder { color: #3a3a3a; }

  .id-display {
    background: #141414;
    border: 1px solid #1e1e1e;
    border-radius: 8px;
    color: #444;
    font-size: 0.9rem;
    padding: 10px 14px;
    font-family: 'Courier New', monospace;
  }

  .form-actions {
    display: flex;
    gap: 10px;
    justify-content: flex-end;
    margin-top: 24px;
    padding-top: 20px;
    border-top: 1px solid #1e1e1e;
  }
  .btn-save {
    background: #990000; color: #fff; border: none; border-radius: 8px;
    padding: 10px 24px; font-size: 0.9rem; font-weight: 600; cursor: pointer;
    transition: background 0.2s; display: flex; align-items: center; gap: 7px;
  }
  .btn-save:hover { background: #b30000; }
  .btn-cancel {
    background: transparent; color: #888; border: 1px solid #2a2a2a; border-radius: 8px;
    padding: 10px 18px; font-size: 0.9rem; cursor: pointer; transition: all 0.2s;
    text-decoration: none; display: flex; align-items: center; gap: 6px;
  }
  .btn-cancel:hover { color: #fff; border-color: #555; }

  @media (max-width: 520px) {
    .form-row { grid-template-columns: 1fr; }
  }
</style>

<div class="edit-container">
  <a href="/clients" class="back-link">
    <i class='bx bx-arrow-back'></i> Retour aux clients
  </a>

  <div class="edit-card">
    <div class="edit-card-header">
      <i class='bx bx-user-circle'></i>
      <div>
        <h2>Modifier le client</h2>
        <p>{{ client.nom }} {{ client.prenom }} — ID #{{ client.id_client }}</p>
      </div>
    </div>

    <div class="edit-card-body">
      <form method="POST">

        <div class="section-label">
          <i class='bx bx-id-card'></i> Identité
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Nom</label>
            <input type="text" name="nom" value="{{ client.nom or '' }}" placeholder="Nom de famille" required>
          </div>
          <div class="form-group">
            <label>Prénom</label>
            <input type="text" name="prenom" value="{{ client.prenom or '' }}" placeholder="Prénom" required>
          </div>
        </div>
        <div class="form-row full">
          <div class="form-group">
            <label>CIN</label>
            <input type="text" name="cin" value="{{ client.cin or '' }}" placeholder="AB123456">
          </div>
        </div>

        <div class="section-label" style="margin-top: 22px;">
          <i class='bx bx-phone'></i> Coordonnées
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Téléphone</label>
            <input type="text" name="telephone" value="{{ client.telephone or '' }}" placeholder="0600000000">
          </div>
          <div class="form-group">
            <label>Email</label>
            <input type="email" name="email" value="{{ client.email or '' }}" placeholder="email@exemple.com">
          </div>
        </div>
        <div class="form-row full">
          <div class="form-group">
            <label>Adresse</label>
            <input type="text" name="adresse" value="{{ client.adresse or '' }}" placeholder="Rue, Ville, Code postal">
          </div>
        </div>

        <div class="form-actions">
          <a href="/clients" class="btn-cancel">
            <i class='bx bx-x'></i> Annuler
          </a>
          <button type="submit" class="btn-save">
            <i class='bx bx-save'></i> Enregistrer
          </button>
        </div>
      </form>
    </div>
  </div>
</div>

{% endblock %}
